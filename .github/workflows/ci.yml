name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install "uv==0.10.4"
          uv sync --frozen --extra training --extra dev
      - name: Ruff
        run: uv run ruff check src tests scripts
      - name: Core and release unit tests
        run: uv run pytest tests/unit tests/release
      - name: Deterministic CycloneDX smoke
        run: |
          uv run python scripts/generate_sbom.py --output release/ci-sbom.cdx.json
          uv run python scripts/generate_sbom.py --output release/ci-sbom.cdx.json --check

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel without runtime downloads
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Install wheel and verify package data
        run: |
          python -m pip install dist/*.whl
          cd /tmp
          python -c "from pii_zh.taxonomy import load_taxonomy; assert load_taxonomy().version"
